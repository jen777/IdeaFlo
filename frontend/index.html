<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaFlo MVP</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>IdeaFlo</h1>
    <p>Simple idea + document manager</p>
  </header>

  <main>
    <section class="panel">
      <h2>Create Idea</h2>
      <form id="create-idea-form">
        <label>Title <input name="title" required /></label>
        <label>Summary <textarea name="summary"></textarea></label>
        <label>Status <input name="status" placeholder="new / in-progress / done" value="new" /></label>
        <label>Current State <textarea name="current_state"></textarea></label>
        <label>Future Steps <textarea name="future_steps"></textarea></label>
        <button type="submit">Create</button>
      </form>
    </section>

    <section class="panel">
      <h2>Ideas</h2>
      <div id="ideas-list"></div>
    </section>

    <section class="panel" id="detail-panel" hidden>
      <h2>Selected Idea</h2>
      <form id="update-idea-form">
        <input type="hidden" name="id" />
        <label>Title <input name="title" required /></label>
        <label>Summary <textarea name="summary"></textarea></label>
        <label>Status <input name="status" /></label>
        <label>Current State <textarea name="current_state"></textarea></label>
        <label>Future Steps <textarea name="future_steps"></textarea></label>
        <div class="row">
          <button type="submit">Save Changes</button>
          <button type="button" id="delete-idea-btn" class="danger">Delete Idea</button>
        </div>
      </form>

      <h3>Documents</h3>
      <form id="upload-form">
        <input type="file" name="file" required />
        <button type="submit">Upload</button>
      </form>
      <div id="docs-list"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
