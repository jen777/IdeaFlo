<!doctype html><html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IdeaFlo Ideas</title><link rel="stylesheet" href="/styles.css" />
</head><body>
<header><h1>IdeaFlo</h1><p>View and manage ideas</p></header>
<div id="nav"></div>
<main>
<section class="panel"><h2>Ideas</h2><div id="ideas-list"></div></section>
<section class="panel" id="detail-panel" hidden>
  <h2>Selected Idea</h2>
  <form id="update-idea-form">
    <input type="hidden" name="id" />
    <label>Title <input name="title" required /></label>
    <label>Summary <textarea name="summary"></textarea></label>
    <label>Status <input name="status" /></label>
    <label>Current State <textarea name="current_state"></textarea></label>
    <label>Future Steps <textarea name="future_steps"></textarea></label>
    <div class="row"><button type="submit">Save</button><button id="delete-idea-btn" type="button" class="danger">Delete Idea</button></div>
  </form>
  <h3>Documents</h3>
  <form id="upload-form"><input type="file" required/><button type="submit">Upload</button></form>
  <div id="docs-list"></div>
</section>
</main>
<script src="/common.js"></script>
<script src="/ideas.js"></script>
</body></html>
