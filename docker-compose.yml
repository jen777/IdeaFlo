services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    image: ghcr.io/jen777/ideaflo-backend:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FILE_STORAGE_PATH: ${FILE_STORAGE_PATH}
    volumes:
      - docs_data:${FILE_STORAGE_PATH}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    image: ghcr.io/jen777/ideaflo-frontend:latest
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  docs_data:
